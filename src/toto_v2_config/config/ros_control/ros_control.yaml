"":
  joint_states_controller:
      type: joint_state_controller/JointStateController
      publish_rate: 50

  joint_group_position_controller:
      type: position_controllers/JointTrajectoryController
      joints:
          - FL_HipX_joint
          - FL_HipY_joint
          - FL_Knee_joint
          - FR_HipX_joint
          - FR_HipY_joint
          - FR_Knee_joint
          - HL_HipX_joint
          - HL_HipY_joint
          - HL_Knee_joint
          - HR_HipX_joint
          - HR_HipY_joint
          - HR_Knee_joint
constraints:
      goal_time: 1.0
      stopped_velocity_tolerance: 0.02
state_publish_rate: 50
action_monitor_rate: 20

 
# PID for Gazebo → converts position commands to efforts

gazebo_ros_control:
  pid_gains:
    FL_HipX_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    FL_HipY_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    FL_Knee_joint: {p: 450.0, i: 8.0,  d: 10.0, i_clamp: 30.0}
    FR_HipX_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    FR_HipY_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    FR_Knee_joint: {p: 450.0, i: 8.0,  d: 10.0, i_clamp: 30.0}
    HL_HipX_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    HL_HipY_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    HL_Knee_joint: {p: 450.0, i: 8.0,  d: 10.0, i_clamp: 30.0}
    HR_HipX_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    HR_HipY_joint: {p: 380.0, i: 5.0,  d: 8.0,  i_clamp: 20.0}
    HR_Knee_joint: {p: 450.0, i: 8.0,  d: 10.0, i_clamp: 30.0} 
