controller_list:
  - name: fake_fl_leg_controller
    type: $(arg fake_execution_type)
    joints:
      - FL_HipX_joint
      - FL_HipY_joint
      - FL_Knee_joint
  - name: fake_fr_leg_controller
    type: $(arg fake_execution_type)
    joints:
      - FR_HipX_joint
      - FR_HipY_joint
      - FR_Knee_joint
  - name: fake_hl_leg_controller
    type: $(arg fake_execution_type)
    joints:
      - HL_HipX_joint
      - HL_HipY_joint
      - HL_Knee_joint
  - name: fake_hr_leg_controller
    type: $(arg fake_execution_type)
    joints:
      - HR_HipX_joint
      - HR_HipY_joint
      - HR_Knee_joint
  - name: fake_whole_body_controller
    type: $(arg fake_execution_type)
    joints:
      - FL_HipX_joint
      - FL_HipY_joint
      - FL_Knee_joint
      - FR_HipX_joint
      - FR_HipY_joint
      - FR_Knee_joint
      - HL_HipX_joint
      - HL_HipY_joint
      - HL_Knee_joint
      - HR_HipX_joint
      - HR_HipY_joint
      - HR_Knee_joint
initial:  # Define initial robot poses per group
  - group: whole_body
    pose: sitting